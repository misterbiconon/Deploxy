<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DeployX — Morelos Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #05060d; --bg2: #090b14; --border: rgba(255,255,255,0.06);
  --accent: #00e5ff; --accent2: #bf5af2; --green: #00ffa3; --text: #eceef8; --muted: #4a5068;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
.wrap { max-width: 800px; margin: 0 auto; }
.topbar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
.logo-text { font-family: 'Syne', sans-serif; font-size: 24px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 18px; padding: 25px; margin-bottom: 30px; }
.input { width: 100%; padding: 12px; background: #0d1020; border: 1px solid var(--border); border-radius: 10px; color: #fff; margin-bottom: 15px; outline: none; }
.drop-zone { border: 2px dashed var(--border); border-radius: 14px; padding: 30px; text-align: center; cursor: pointer; background: #0d1020; position: relative; margin-bottom: 20px; }
.drop-zone.active { border-color: var(--accent); background: #00e5ff05; }
.btn-deploy { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 12px; font-family: 'Syne', sans-serif; font-weight: 800; cursor: pointer; color: #000; }
.proj-card { background: var(--bg2); border: 1px solid var(--border); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
.btn-sm { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; text-decoration: none; cursor: pointer; border: 1px solid; }
.btn-view { background: #00e5ff10; color: var(--accent); border-color: #00e5ff30; }
.btn-del { background: #ff4d6d10; color: #ff4d6d; border-color: #ff4d6d30; margin-left: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo-text">DeployX 🚀</div>
    <div style="color:var(--green); font-size:12px;">● Servidor Online</div>
  </div>

  <div class="card">
    <input type="text" class="input" id="pName" placeholder="Nombre del proyecto (ej: codex)"/>
    <div class="drop-zone" id="dz">
      <input type="file" id="pZip" accept=".zip,.html" style="position:absolute; inset:0; opacity:0; cursor:pointer;" onchange="updateFile(this)"/>
      <div id="icon" style="font-size:35px; margin-bottom:10px;">📦</div>
      <div id="txt" style="font-size:14px; color:var(--muted);">Sube tu <b>ZIP</b> o <b>HTML</b></div>
    </div>
    <button class="btn-deploy" onclick="subir()">▲ PUBLICAR AHORA</button>
  </div>

  <h2 style="font-family:'Syne'; font-size:18px; margin-bottom:15px;">Mis Sitios Web</h2>
  <div id="list"></div>
</div>

<script>
function updateFile(input) {
  const file = input.files[0];
  if(file) {
    document.getElementById('dz').classList.add('active');
    document.getElementById('icon').textContent = file.name.endsWith('.html') ? "📄" : "📦";
    document.getElementById('txt').innerHTML = `<span style="color:var(--accent)">Seleccionado:</span> ${file.name}`;
  }
}

async function cargar() {
  const res = await fetch('/api/projects');
  const data = await res.json();
  document.getElementById('list').innerHTML = data.projects.map(p => `
    <div class="proj-card">
      <div><b>${p}</b><div style="font-size:10px; color:var(--muted)">/sites/${p}/index.html</div></div>
      <div>
        <a class="btn-sm btn-view" href="/sites/${p}/index.html" target="_blank">Ver</a>
        <button class="btn-sm btn-del" onclick="borrar('${p}')">Borrar</button>
      </div>
    </div>`).join('');
}

async function subir() {
  const name = document.getElementById('pName').value.trim();
  const file = document.getElementById('pZip').files[0];
  if(!name || !file) return alert("Faltan datos");
  const fd = new FormData(); fd.append('name', name); fd.append('zipfile', file);
  const res = await fetch('/deploy', { method: 'POST', body: fd });
  if(res.ok) { alert("¡Publicado!"); cargar(); }
}

async function borrar(n) {
  if(confirm(`¿Borrar ${n}?`)) { await fetch('/api/projects/'+n, {method:'DELETE'}); cargar(); }
}
cargar();
</script>
</body>
</html>
