<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeployX</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0b;
      --surface:   #111114;
      --border:    #1e1e24;
      --border2:   #2a2a33;
      --purple:    #7c3aed;
      --purple-l:  #9d5cf6;
      --purple-bg: #7c3aed18;
      --green:     #22c55e;
      --green-bg:  #22c55e18;
      --muted:     #52525e;
      --text:      #e4e4e8;
      --text-dim:  #9898a6;
      --radius:    10px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOP BAR ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.3px;
      color: var(--text);
      text-decoration: none;
    }

    .logo-icon {
      width: 26px; height: 26px;
      background: var(--purple);
      border-radius: 7px;
      display: grid;
      place-items: center;
    }

    .logo-icon svg { width: 14px; height: 14px; fill: #fff; }

    .header-sep { flex: 1; }

    .header-pill {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--green);
      background: var(--green-bg);
      border: 1px solid #22c55e33;
      border-radius: 20px;
      padding: 3px 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .btn-admin {
      font-family: 'Instrument Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 5px 14px;
      cursor: pointer;
      transition: all .15s;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-admin:hover {
      border-color: var(--purple);
      color: var(--text);
    }

    /* ── MAIN ── */
    main {
      padding-top: 52px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 60px;
    }

    .wrapper {
      width: 100%;
      max-width: 480px;
      padding: 0 20px;
      animation: fadeUp .4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .breadcrumb span { color: var(--text-dim); }
    .breadcrumb .sep { font-size: 10px; }

    /* heading */
    .heading {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .subheading {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 28px;
    }

    /* card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .badge {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: var(--purple-l);
      background: var(--purple-bg);
      border: 1px solid #7c3aed33;
      border-radius: 20px;
      padding: 2px 8px;
    }

    .card-body { padding: 20px; }

    /* dropzone */
    #dropzone {
      border: 1.5px dashed var(--border2);
      border-radius: var(--radius);
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      position: relative;
    }

    #dropzone:hover,
    #dropzone.drag-over {
      border-color: var(--purple);
      background: var(--purple-bg);
    }

    #dropzone.drag-over .drop-icon { transform: scale(1.1); }

    #file-input { display: none; }

    .drop-icon {
      width: 40px; height: 40px;
      margin: 0 auto 12px;
      background: var(--border);
      border-radius: 10px;
      display: grid;
      place-items: center;
      transition: transform .2s;
    }

    .drop-icon svg { width: 18px; height: 18px; stroke: var(--text-dim); fill: none; }

    .drop-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }

    .drop-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .drop-sub strong {
      color: var(--purple-l);
      font-weight: 500;
    }

    /* file selected state */
    #file-selected {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--border);
      border-radius: var(--radius);
      margin-top: 14px;
    }

    #file-selected.show { display: flex; }

    .file-icon {
      width: 32px; height: 32px;
      background: var(--purple-bg);
      border-radius: 8px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .file-icon svg { width: 15px; height: 15px; stroke: var(--purple-l); fill: none; }

    .file-name {
      flex: 1;
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-clear {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: color .15s;
    }

    .file-clear:hover { color: var(--text); }

    /* project name field */
    .field { margin-top: 16px; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 9px 12px;
      font-family: 'Geist Mono', monospace;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }

    .field input::placeholder { color: var(--muted); }

    .field input:focus { border-color: var(--purple); }

    /* deploy button */
    #deploy-btn {
      margin-top: 20px;
      width: 100%;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 10px;
      font-family: 'Instrument Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background .15s, opacity .15s;
    }

    #deploy-btn:hover { background: var(--purple-l); }
    #deploy-btn:disabled { opacity: .5; cursor: not-allowed; }

    #deploy-btn svg { width: 14px; height: 14px; stroke: #fff; fill: none; }

    /* progress */
    #progress-wrap {
      display: none;
      margin-top: 16px;
    }

    #progress-wrap.show { display: block; }

    .prog-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .prog-bar-bg {
      height: 4px;
      background: var(--border2);
      border-radius: 99px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      background: var(--purple);
      border-radius: 99px;
      width: 0%;
      transition: width .3s ease;
    }

    /* status */
    #status {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
    }

    #status.show { display: flex; align-items: center; gap: 8px; }

    #status.success {
      background: var(--green-bg);
      border: 1px solid #22c55e33;
      color: var(--green);
    }

    #status.error {
      background: #ef444418;
      border: 1px solid #ef444433;
      color: #f87171;
    }

    #status svg { width: 15px; height: 15px; flex-shrink: 0; }
    #status.success svg { stroke: var(--green); fill: none; }
    #status.error svg { stroke: #f87171; fill: none; }

    /* ── RECENT DEPLOYS (inline) ── */
    #recent-section {
      margin-top: 24px;
      animation: fadeUp .4s .1s ease both;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .project-list { display: flex; flex-direction: column; gap: 6px; }

    .project-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color .15s;
    }

    .project-item:hover { border-color: var(--border2); }

    .proj-status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .proj-name {
      flex: 1;
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      color: var(--text);
    }

    .proj-link {
      font-size: 11px;
      color: var(--purple-l);
      text-decoration: none;
    }

    .proj-link:hover { text-decoration: underline; }

    .proj-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 3px;
      border-radius: 4px;
      transition: color .15s;
      display: flex;
      align-items: center;
    }

    .proj-delete:hover { color: #f87171; }
    .proj-delete svg { width: 13px; height: 13px; stroke: currentColor; fill: none; }

    #no-projects {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      padding: 20px;
    }

    /* footer */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 11px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<header>
  <a class="logo" href="#">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16"><path d="M2 13L8 3l6 10H2z"/></svg>
    </div>
    DeployX
  </a>
  <div class="header-sep"></div>
  <div class="header-pill">
    <span class="dot"></span>
    <span id="online-count">0</span> online
  </div>
  <a class="btn-admin" href="admin.html">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Admin
  </a>
</header>

<!-- MAIN -->
<main>
  <div class="wrapper">

    <div class="breadcrumb">
      <span>Mi espacio</span>
      <span class="sep">›</span>
      <span>Nuevo deploy</span>
    </div>

    <h1 class="heading">Subir proyecto</h1>
    <p class="subheading">Arrastra tu ZIP y DeployX lo sirve al instante.</p>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Deployment</span>
        <span class="badge">ZIP → Static</span>
      </div>
      <div class="card-body">

        <!-- Dropzone -->
        <div id="dropzone">
          <input type="file" id="file-input" accept=".zip"/>
          <div class="drop-icon">
            <svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </div>
          <p class="drop-title">Arrastra el ZIP aquí</p>
          <p class="drop-sub">o <strong>haz clic</strong> para seleccionar</p>
        </div>

        <!-- File selected -->
        <div id="file-selected">
          <div class="file-icon">
            <svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <span class="file-name" id="fname">—</span>
          <button class="file-clear" id="file-clear-btn" title="Quitar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <!-- Project name -->
        <div class="field">
          <label for="project-name">Nombre del proyecto</label>
          <input type="text" id="project-name" placeholder="mi-proyecto" autocomplete="off" spellcheck="false"/>
        </div>

        <!-- Deploy button -->
        <button id="deploy-btn" disabled>
          <svg viewBox="0 0 24 24" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          Desplegar
        </button>

        <!-- Progress -->
        <div id="progress-wrap">
          <div class="prog-label">
            <span>Subiendo…</span>
            <span id="prog-pct">0%</span>
          </div>
          <div class="prog-bar-bg">
            <div id="progress-bar"></div>
          </div>
        </div>

        <!-- Status -->
        <div id="status">
          <svg viewBox="0 0 24 24" stroke-width="2" id="status-icon"></svg>
          <span id="status-msg"></span>
        </div>

      </div>
    </div>

    <!-- Recent deploys -->
    <div id="recent-section">
      <p class="section-label">Proyectos activos</p>
      <div class="project-list" id="project-list">
        <p id="no-projects">Cargando…</p>
      </div>
    </div>

  </div>
</main>

<footer>DeployX · Hosting personal</footer>

<script>
  const dropzone   = document.getElementById('dropzone');
  const fileInput  = document.getElementById('file-input');
  const fileSelDiv = document.getElementById('file-selected');
  const fnameEl    = document.getElementById('fname');
  const clearBtn   = document.getElementById('file-clear-btn');
  const nameInput  = document.getElementById('project-name');
  const deployBtn  = document.getElementById('deploy-btn');
  const progWrap   = document.getElementById('progress-wrap');
  const progBar    = document.getElementById('progress-bar');
  const progPct    = document.getElementById('prog-pct');
  const statusEl   = document.getElementById('status');
  const statusMsg  = document.getElementById('status-msg');
  const statusIcon = document.getElementById('status-icon');
  const onlineEl   = document.getElementById('online-count');

  let selectedFile = null;

  // Dropzone click
  dropzone.addEventListener('click', () => fileInput.click());

  // Drag & drop
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) setFile(f);
  });

  fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

  function setFile(f) {
    selectedFile = f;
    fnameEl.textContent = f.name;
    fileSelDiv.classList.add('show');
    if (!nameInput.value) nameInput.value = f.name.replace('.zip','');
    checkReady();
  }

  clearBtn.addEventListener('click', () => {
    selectedFile = null;
    fileInput.value = '';
    fileSelDiv.classList.remove('show');
    checkReady();
  });

  nameInput.addEventListener('input', checkReady);

  function checkReady() {
    deployBtn.disabled = !(selectedFile && nameInput.value.trim());
  }

  // Deploy
  deployBtn.addEventListener('click', async () => {
    if (!selectedFile || !nameInput.value.trim()) return;

    const fd = new FormData();
    fd.append('zip', selectedFile);
    fd.append('name', nameInput.value.trim());

    setStatus('');
    progWrap.classList.add('show');
    progBar.style.width = '0%';
    progPct.textContent = '0%';
    deployBtn.disabled = true;

    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/deploy');

    xhr.upload.onprogress = e => {
      if (e.lengthComputable) {
        const p = Math.round(e.loaded / e.total * 100);
        progBar.style.width = p + '%';
        progPct.textContent = p + '%';
      }
    };

    xhr.onload = () => {
      progWrap.classList.remove('show');
      if (xhr.status === 200) {
        showStatus('success', '¡Proyecto desplegado correctamente!');
        loadProjects();
        selectedFile = null; fileInput.value = '';
        fileSelDiv.classList.remove('show');
        nameInput.value = '';
      } else {
        showStatus('error', 'Error al desplegar. Inténtalo de nuevo.');
      }
      deployBtn.disabled = false;
      checkReady();
    };

    xhr.onerror = () => {
      progWrap.classList.remove('show');
      showStatus('error', 'Error de conexión.');
      deployBtn.disabled = false; checkReady();
    };

    xhr.send(fd);
  });

  function showStatus(type, msg) {
    statusEl.className = 'show ' + type;
    statusMsg.textContent = msg;
    if (type === 'success') {
      statusIcon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
    } else {
      statusIcon.innerHTML = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
    }
  }

  function setStatus(s) { if (!s) { statusEl.className = ''; } }

  // Load projects
  async function loadProjects() {
    try {
      const r = await fetch('/api/projects');
      const d = await r.json();
      onlineEl.textContent = d.online || 0;
      renderProjects(d.projects || []);
    } catch(e) { /* silent */ }
  }

  function renderProjects(list) {
    const el = document.getElementById('project-list');
    const np = document.getElementById('no-projects');
    if (!list.length) {
      el.innerHTML = '';
      el.appendChild(np);
      np.style.display = 'block';
      np.textContent = 'Sin proyectos aún.';
      return;
    }
    el.innerHTML = list.map(p => `
      <div class="project-item">
        <div class="proj-status-dot"></div>
        <span class="proj-name">${p}</span>
        <a class="proj-link" href="/sites/${p}/" target="_blank">↗ Ver</a>
        <button class="proj-delete" onclick="deleteProject('${p}')" title="Eliminar">
          <svg viewBox="0 0 24 24" stroke-width="1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    `).join('');
  }

  async function deleteProject(name) {
    if (!confirm(`¿Eliminar "${name}"?`)) return;
    await fetch(`/api/projects/${name}`, { method: 'DELETE' });
    loadProjects();
  }

  loadProjects();
  setInterval(loadProjects, 3000);
</script>
</body>
</html>
