<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeployX - Administración</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #06080f; --surface: #0d1117; --border: rgba(255,255,255,0.07);
      --accent: #00e5ff; --accent2: #bf5af2; --text: #e8eaf2; --muted: #5a6177;
      --success: #00ffa3; --danger: #ff4d6d;
    }
    body { 
      font-family: 'DM Sans', sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      padding: 2rem 1rem; 
      line-height: 1.6;
    }
    .page { max-width: 800px; margin: 0 auto; position: relative; z-index: 1; }
    
    .header { 
      margin-bottom: 2.5rem; 
      border-bottom: 1px solid var(--border); 
      padding-bottom: 1rem; 
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand h1 { 
      font-family: 'Syne', sans-serif; 
      font-size: 2rem; 
      background: linear-gradient(to right, #fff, var(--accent)); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
    }
    
    .stats-card { 
      background: var(--surface); 
      border: 1px solid var(--border); 
      border-radius: 1rem; 
      padding: 1.5rem; 
      margin-bottom: 2rem; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    .stat-val { font-family: 'Syne', sans-serif; font-size: 2.5rem; color: var(--accent); }
    .stat-lab { color: var(--muted); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }

    .upload-box { 
      background: var(--surface); 
      border: 1px solid var(--border); 
      padding: 2rem; 
      border-radius: 1.5rem; 
      margin-bottom: 2rem; 
    }
    input[type="text"] { 
      width: 100%; 
      padding: 0.8rem; 
      background: #06080f; 
      border: 1px solid var(--border); 
      border-radius: 0.6rem; 
      color: white; 
      margin-bottom: 1rem; 
      outline: none; 
    }
    .btn-main { 
      width: 100%; 
      padding: 1rem; 
      border: none; 
      border-radius: 0.8rem; 
      background: linear-gradient(135deg, var(--accent), var(--accent2)); 
      color: #000; 
      font-family: 'Syne', sans-serif; 
      font-weight: 800; 
      cursor: pointer; 
      transition: opacity 0.2s;
    }
    .btn-main:hover { opacity: 0.9; }
    
    .project-card { 
      background: var(--surface); 
      border: 1px solid var(--border); 
      padding: 1rem; 
      border-radius: 1rem; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 0.8rem; 
      transition: transform 0.2s; 
    }
    .project-card:hover { transform: translateX(5px); border-color: var(--accent); }
    .btn-view { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.8rem; }
    .btn-del { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 0.8rem; margin-left: 15px; font-weight: 600; }
    
    #uploadStatus { 
        margin-top: 1rem; 
        text-align: center; 
        font-size: 0.9rem; 
        display: none; 
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="brand"><h1>DeployX</h1></div>
      <div style="font-size: 0.7rem; color: var(--muted);">v2.0 · Morelos</div>
    </div>

    <div class="stats-card">
      <div>
        <div class="stat-lab">Proyectos Totales</div>
        <div class="stat-val" id="totalCount">0</div>
      </div>
      <div style="text-align: right;">
        <div class="stat-lab">Estado</div>
        <div style="color: var(--success); font-weight: bold;">SISTEMA ONLINE</div>
      </div>
    </div>

    <div class="upload-box">
      <input type="text" id="pName" placeholder="Nombre del proyecto (ej: mi-web)">
      <input type="file" id="pZip" accept=".zip" style="margin-bottom: 1rem; display: block; width: 100%; color: var(--muted);">
      <button class="btn-main" onclick="subir()">🚀 DESPLEGAR AHORA</button>
      <div id="uploadStatus"></div>
    </div>

    <h2 style="font-family: 'Syne'; margin-bottom: 1rem; font-size: 1.2rem;">Mis Sitios Web</h2>
    <div id="projectList">
        <p style="color: var(--muted); text-align: center;">Cargando proyectos...</p>
    </div>
    
    <p style="text-align:center; color:#1e2535; font-size:0.7rem; margin-top:3rem;">MORELOS CLOUD · 2026</p>
  </div>

  <script>
    // Cargar la lista de proyectos al iniciar
    async function cargar() {
      try {
        const res = await fetch('/api/projects');
        const data = await res.json();
        document.getElementById('totalCount').innerText = data.projects.length;
        
        const list = document.getElementById('projectList');
        if (data.projects.length === 0) {
            list.innerHTML = '<p style="color: var(--muted); text-align: center;">No hay proyectos todavía.</p>';
            return;
        }

        list.innerHTML = data.projects.map(p => `
          <div class="project-card">
            <span>🌐 ${p}</span>
            <div>
              <a class="btn-view" href="/sites/${p}/index.html" target="_blank">VER</a>
              <button class="btn-del" onclick="borrar('${p}')">BORRAR</button>
            </div>
          </div>`).join('');
      } catch (e) {
        console.error("Error al cargar proyectos");
      }
    }

    async function subir() {
      const nameInput = document.getElementById('pName');
      const fileInput = document.getElementById('pZip');
      const statusEl = document.getElementById('uploadStatus');
      
      const name = nameInput.value.trim();
      const file = fileInput.files[0];

      if(!name || !file) {
          alert("Por favor, pon un nombre y selecciona un archivo .zip");
          return;
      }

      statusEl.style.display = 'block';
      statusEl.innerText = "⏳ Subiendo archivo...";
      statusEl.style.color = "var(--accent)";

      const fd = new FormData();
      fd.append('name', name);
      fd.append('zipfile', file);

      try {
        const res = await fetch('/deploy', { method: 'POST', body: fd });
        if(res.ok) {
          statusEl.innerText = "✅ ¡Proyecto publicado con éxito!";
          statusEl.style.color = "var(--success)";
          nameInput.value = "";
          fileInput.value = "";
          cargar();
        } else {
          statusEl.innerText = "❌ Error al subir el proyecto.";
          statusEl.style.color = "var(--danger)";
        }
      } catch (e) { 
          statusEl.innerText = "❌ Error de conexión con el servidor.";
          statusEl.style.color = "var(--danger)";
      }
    }

    async function borrar(n) {
      if(confirm(`¿Estás seguro de que quieres eliminar "${n}"?`)) {
        try {
            await fetch(`/api/projects/${n}`, { method: 'DELETE' });
            cargar();
        } catch (e) {
            alert("No se pudo borrar el proyecto.");
        }
      }
    }

    // Ejecutar carga inicial
    cargar();
  </script>
</body>
</html>

            </div>
          </div>`).join('');
      } catch (err) { console.error("Error de conexión real"); }

</html>
