<!DOCTYPE html>
<html>
<head>
    <title>DeployX Admin - Morelos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .stats { background: #1e293b; padding: 10px; border-radius: 10px; margin-bottom: 20px; color: #38bdf8; }
        .project-card { 
            background: #1e293b; padding: 15px; margin: 10px 0; 
            border-radius: 10px; display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid #38bdf8;
        }
        button { cursor: pointer; padding: 8px 12px; border: none; border-radius: 5px; font-weight: bold; }
        .btn-view { background: #38bdf8; color: #0f172a; margin-right: 5px; text-decoration: none; padding: 8px; font-size: 13px; border-radius: 5px; }
        .btn-del { background: #ef4444; color: white; }
        input, .upload-section { background: #1e293b; color: white; border: 1px solid #38bdf8; padding: 10px; width: 80%; margin: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 DeployX Admin</h1>
        <div class="stats" id="stats">Cargando radar...</div>

        <div class="upload-section">
            <h3>Subir Nuevo Proyecto</h3>
            <input type="text" id="projName" placeholder="Nombre del proyecto"><br>
            <input type="file" id="zipFile"><br><br>
            <button class="btn-view" onclick="upload()">Publicar Ahora</button>
        </div>

        <h3>Mis Proyectos en Vivo</h3>
        <div id="projectList"></div>
    </div>

    <script>
        async function loadProjects() {
            const res = await fetch('/api/projects');
            const data = await res.json();
            document.getElementById('stats').innerText = `Conectados: ${data.online} | Proyectos: ${data.projects.length}`;
            
            const list = document.getElementById('projectList');
            list.innerHTML = '';
            data.projects.forEach(p => {
                list.innerHTML += `
                    <div class="project-card">
                        <span>${p}</span>
                        <div>
                            <a class="btn-view" href="/sites/${p}/index.html" target="_blank">Ver Web</a>
                            <button class="btn-del" onclick="deleteProj('${p}')">Borrar</button>
                        </div>
                    </div>`;
            });
        }

        async function upload() {
            const formData = new FormData();
            formData.append('name', document.getElementById('projName').value);
            formData.append('zipfile', document.getElementById('zipFile').files[0]);
            await fetch('/deploy', { method: 'POST', body: formData });
            location.reload();
        }

        async function deleteProj(name) {
            if(confirm(`¿Borrar ${name} para siempre?`)) {
                await fetch(`/api/projects/${name}`, { method: 'DELETE' });
                loadProjects();
            }
        }

        setInterval(loadProjects, 3000); // Actualiza cada 3 segundos
        loadProjects();
    </script>
</body>
</html>

<style>
    body {
    
      border-radius: 999px;
      padding: 0.35rem 1rem;
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 3.4rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent) 60%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.6rem;
    }

    .subtitle { color: var(--muted); font-size: 0.95rem; font-weight: 300; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 2rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    .field { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.55rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.85rem 1rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      outline: none;
    }

    .dropzone {
      border: 2px dashed rgba(255,255,255,0.1);
      border-radius: 0.75rem;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      position: relative;
      background: rgba(255,255,255,0.02);
    }

    .dropzone.drag-over { border-color: var(--accent); background: rgba(0,229,255,0.05); }

    .dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .btn {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 0.75rem;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #06080f;
      box-shadow: 0 4px 24px rgba(0,229,255,0.25);
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #status {
      margin-top: 1.25rem;
      padding: 1rem;
      border-radius: 0.75rem;
      font-size: 0.9rem;
      display: none;
    }

    #status.success { display: block; background: rgba(0,255,163,0.07); color: var(--success); border: 1px solid rgba(0,255,163,0.2); }
    #status.error { display: block; background: rgba(255,77,109,0.07); color: var(--danger); border: 1px solid rgba(255,77,109,0.2); }
    #status a { color: var(--accent); font-weight: 600; text-decoration: none; }
    
    .footer { text-align: center; margin-top: 1.5rem; font-size: 0.75rem; color: #2a2f45; }
  </style>
</head>
<body>
  <div class="orb2"></div>

  <div class="wrapper">
    <div class="header">
      <div class="logo-badge">En línea</div>
      <h1>DeployX</h1>
      <p class="subtitle">Sube tu proyecto. Estará en vivo en segundos.</p>
    </div>

    <div class="card">
      <form id="uploadForm">
        <div class="field">
          <label>Nombre del proyecto</label>
          <input type="text" id="projectName" placeholder="ej: mi-portafolio" required />
        </div>

        <div class="field">
          <label>Archivo .zip</label>
          <div class="dropzone" id="dropzone">
            <input type="file" id="zipFile" accept=".zip" required />
            <span class="drop-icon">📦</span>
            <div class="drop-label">Arrastra tu archivo aquí o <span>haz clic para seleccionar</span></div>
            <div class="file-chosen" id="fileName" style="color: var(--success); margin-top: 10px;"></div>
          </div>
        </div>

        <button type="submit" class="btn" id="btn">🚀 Publicar Proyecto</button>
      </form>
      <div id="status"></div>
    </div>
    <p class="footer">DEPLOYX · HOSTING PERSONAL</p>
  </div>

  <script>
    const form = document.getElementById('uploadForm');
    const status = document.getElementById('status');
    const btn = document.getElementById('btn');
    const zipInput = document.getElementById('zipFile');
    const fileNameEl = document.getElementById('fileName');
    const dropzone = document.getElementById('dropzone');

    zipInput.addEventListener('change', () => {
      if (zipInput.files[0]) fileNameEl.textContent = '✓ ' + zipInput.files[0].name;
    });

    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) {
        zipInput.files = e.dataTransfer.files;
        fileNameEl.textContent = '✓ ' + e.dataTransfer.files[0].name;
      }
    });

    form.onsubmit = async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.innerHTML = '⌛ Procesando...';
      status.style.display = 'none';

      const formData = new FormData();
      formData.append('name', document.getElementById('projectName').value);
      formData.append('zipfile', zipInput.files[0]);

      try {
        const res = await fetch('/deploy', { method: 'POST', body: formData });
        const result = await res.json();

        if (res.ok) {
          status.className = 'success';
          status.innerHTML = `✅ ¡Desplegado con éxito!<br><br><a href="${result.url}" target="_blank">→ Abrir mi sitio web</a>`;
        } else {
          status.className = 'error';
          status.innerHTML = '❌ ' + (result.error || 'Error al subir.');
        }
      } catch (err) {
        status.className = 'error';
        status.innerHTML = '❌ Error de conexión con el servidor.';
      } finally {
        status.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '🚀 Publicar Proyecto';
      }
    };
  </script>
</body>
</html>
